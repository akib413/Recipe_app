<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Tailwind & daisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>

    <div class="search-container text-center">
        <h1 class="text-3xl font-bold p-6">Find Your Meal...</h1>
        <div class="join">
            <div>
                <label class="input validator join-item">
                    <input id="get-input" type="text" placeholder="Enter an ingredient" required />
                </label>
            </div>
            <button id="search-btn" class="btn btn-neutral join-item">Search</button>
        </div>
        <p id="alert"></p>
    </div>

    <h2 class="text-3xl font-bold text-center p-10">Your search result:</h2>

    <div id="all-meals" class="w-11/12 mx-auto grid grid-cols-3 gap-6">

    </div>
    <div class="show-recipe">
        <!-- You can open the modal using ID.showModal() method -->
        <!-- <button class="btn" onclick="my_modal_3.showModal()">open modal</button> -->
        <dialog id="my_modal_3" class="modal">
            <div id="modal-content" class="modal-box">

            </div>
        </dialog>
    </div>

    <script src="recipe.js"></script>
</body>

</html>
